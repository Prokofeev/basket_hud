<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Player Card Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff7115;
    --black: #030303;
    --white: #ffffff;
    --ink: #060606;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 1920px; height: 1080px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    pointer-events: none;
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .card {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 500px;
    overflow: hidden;
    transform: translateY(100%);
    transition: transform 0.52s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .card--visible { transform: translateY(0); }

  .card::before,
  .card::after { display: none !important; }

  .card-bg {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 220px;
    background: #ff7414;
    box-shadow: none;
  }

  .card-bg::before,
  .card-bg::after { display: none !important; }

  .photo-col {
    position: absolute;
    z-index: 6;
    left: 355px;
    bottom: 0;
    width: 380px;
    height: 470px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
  }

  .photo-wrap {
    width: 380px;
    height: 470px;
    border-radius: 0;
    overflow: visible;
    position: relative;
  }

  .player-photo {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform-origin: bottom center;
    width: auto;
    height: 470px;
    max-width: none;
    object-fit: contain;
    object-position: bottom center;
    display: none;
    z-index: 1;
    filter: none;
  }
  .player-photo-fallback {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-size: 126px; color: rgba(255, 255, 255, 0.88);
    letter-spacing: 0;
    position: relative; z-index: 0;
    display: block;
    transform: translateY(20px);
  }

  .photo-disc {
    position: absolute;
    z-index: 2;
    left: 245px;
    bottom: -285px;
    width: 540px;
    height: 540px;
    border-radius: 50%;
    background: #000000;
    box-shadow: none;
  }

  .photo-disc::after { display: none !important; }

  .meta {
    position: absolute;
    z-index: 7;
    left: 930px;
    right: 85px;
    bottom: 58px;
    display: flex; flex-direction: column;
    gap: 26px;
  }

  .name-line {
    display: flex; align-items: baseline; gap: 14px;
  }

  .player-name {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-size: 56px; line-height: 0.92;
    font-weight: 900;
    letter-spacing: 0.3px; color: #ffffff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-transform: uppercase;
    text-shadow: none;
  }

  .player-number {
    display: none !important;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 142px);
    gap: 100px;
    align-items: end;
    margin-left: 100px;
    width: max-content;
  }

  .stat-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    min-width: 142px;
    padding: 0;
    border-right: none;
    position: relative;
  }

  .stat-item::before { display: none !important; }

  .stat-val {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 50px; line-height: 0.9;
    font-weight: 900;
    color: #000000;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
    white-space: nowrap;
  }
  .stat-lbl {
    font-size: 18px; line-height: 1;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .team-col {
    position: absolute;
    z-index: 8;
    left: 170px;
    bottom: 95px;
    width: 182px;
    height: 182px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .team-logo-wrap {
    width: 182px; height: 182px;
    border-radius: 50%;
    background: var(--white);
    box-shadow: none;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .team-logo {
    width: 126px; height: 126px;
    object-fit: contain;
    filter: none;
    display: none;
  }

  .team-abbr-fallback {
    font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    font-size: 48px; color: #111;
    letter-spacing: 0;
  }

  .player-sub,
  .divider,
  .stat-item--extra {
    display: none !important;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="card-bg"></div>
  <div class="photo-disc"></div>

  <div class="photo-col">
    <div class="photo-wrap" id="photo-wrap">
      <img class="player-photo" id="player-photo" src="" alt="" referrerpolicy="no-referrer">
      <div class="player-photo-fallback" id="photo-fallback"></div>
    </div>
  </div>

  <div class="meta">
    <div class="name-line">
      <div class="player-name" id="player-name">--</div>
      <div class="player-number" id="player-number"></div>
    </div>
    <div class="player-sub" id="player-sub">--</div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val" id="p-ppg">--</div>
        <div class="stat-lbl">Очки</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="p-rpg">--</div>
        <div class="stat-lbl">Подборы</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="p-fg">--</div>
        <div class="stat-lbl">С игры</div>
      </div>
      <div class="stat-item stat-item--extra">
        <div class="stat-val" id="p-apg">--</div>
        <div class="stat-lbl">Передачи</div>
      </div>
      <div class="stat-item stat-item--extra">
        <div class="stat-val" id="p-stl">--</div>
        <div class="stat-lbl">Перехваты</div>
      </div>
      <div class="stat-item stat-item--extra">
        <div class="stat-val" id="p-blk">--</div>
        <div class="stat-lbl">Блоки</div>
      </div>
    </div>
  </div>

  <div class="team-col" id="team-col">
    <div class="team-logo-wrap" id="team-logo-wrap">
      <img class="team-logo" id="team-logo" src="" alt="" referrerpolicy="no-referrer">
      <div class="team-abbr-fallback" id="team-abbr-fallback">--</div>
    </div>
  </div>
</div>

<script>
  function toMediaUrl(pathOrUrl) {
    if (!pathOrUrl) return null;
    const s = String(pathOrUrl);
    if (s.startsWith('http://') || s.startsWith('https://')) return s;
    return new URL(s.replace(/^\//, ''), window.location.origin + '/').href;
  }

  function pv(v) { return v == null || v === '' ? '--' : String(v); }

  function bustLocalMediaUrl(url) {
    if (!url) return '';
    try {
      const parsed = new URL(url);
      if (parsed.origin === window.location.origin && parsed.pathname.startsWith('/json/')) {
        parsed.searchParams.set('_img', String(Date.now()));
      }
      return parsed.href;
    } catch (e) {
      return url;
    }
  }

  function setPhoto(url) {
    const img = document.getElementById('player-photo');
    const fb  = document.getElementById('photo-fallback');
    const src = bustLocalMediaUrl(url);
    if (!src) { img.style.display = 'none'; img.src = ''; fb.style.display = 'block'; return; }
    img.onerror = function() { img.style.display = 'none'; fb.style.display = 'block'; };
    img.onload  = function() { fb.style.display = 'none'; img.style.display = 'block'; };
    img.src = src;
  }

  function setTeamLogo(url, abbr) {
    const img = document.getElementById('team-logo');
    const fb  = document.getElementById('team-abbr-fallback');
    const src = bustLocalMediaUrl(url);
    fb.textContent = abbr || '--';
    if (!src) { img.style.display = 'none'; fb.style.display = 'block'; return; }
    img.onerror = function() { img.style.display = 'none'; fb.style.display = 'block'; };
    img.onload  = function() { fb.style.display = 'none'; img.style.display = 'block'; };
    img.src = src;
  }

  function numberOrDefault(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function applyPhotoTransform(player) {
    const img = document.getElementById('player-photo');
    if (!img) return;
    const scale = numberOrDefault(player && player.photo_scale, 1);
    const offsetX = numberOrDefault(player && player.photo_offset_x, 0);
    const offsetY = numberOrDefault(player && player.photo_offset_y, 0);
    img.style.transform =
      'translateX(-50%) translateX(' + offsetX + 'px) translateY(' + offsetY + 'px) scale(' + scale + ')';
  }

  function preferredPlayerPhoto(player) {
    if (!player) return '';
    // Mixed crop styles cannot be perfectly standardized without photo_scale/photo_offset_*.
    // For the most stable layout, use one source type: transparent player cutout PNGs.
    return String(
      player.photo_overlay ||
      player.photo_cutout ||
      player.photo_full ||
      player.photo_transparent ||
      player.photo ||
      player.headshot ||
      ''
    ).trim();
  }

  function displayPlayerName(name) {
    const raw = String(name || '').trim();
    const normalized = normText(raw);
    if (normalized.includes('тейтум')) return 'ДЖЕЙСОН ТЕЙТУМ';
    if (normalized.includes('вембан')) return 'ВИКТОР ВЕМБАНЬЯМА';
    return raw;
  }

  function normText(value) {
    return String(value || '').trim().toLowerCase().replace(/ё/g, 'е');
  }

  function compactText(value) {
    return normText(value).replace(/[^a-zа-я0-9]+/g, '');
  }

  function teamMatchesTeamText(teamText, teamData) {
    const team = normText(teamText);
    const teamCompact = compactText(teamText);
    const name = normText(teamData && teamData.name);
    const abbr = normText(teamData && teamData.abbr);
    const nameCompact = compactText(teamData && teamData.name);
    const abbrCompact = compactText(teamData && teamData.abbr);

    if (!team) return false;
    if (abbr && team === abbr) return true;
    if (name && team === name) return true;
    if (abbrCompact && teamCompact === abbrCompact) return true;
    if (nameCompact && teamCompact === nameCompact) return true;
    return nameCompact && teamCompact && (nameCompact.includes(teamCompact) || teamCompact.includes(nameCompact));
  }

  function hintedTeamAbbr(playerName) {
    const name = compactText(playerName);
    if (!name) return '';
    if (name.includes('edgecombe')) return 'PHI';
    if (name.includes('tatum') || name.includes('тейтум')) return 'BOS';
    if (name.includes('wemban') || name.includes('вембан')) return 'SAS';
    return '';
  }

  function teamByAbbrHint(abbr, home, away) {
    const hint = normText(abbr);
    if (!hint) return null;
    if (normText(home && home.abbr) === hint) return home;
    if (normText(away && away.abbr) === hint) return away;
    return null;
  }

  function resolveTeamLogo(player, result) {
    const teamLogo = player.team_logo || '';
    const teamAbbr = player.team_abbr || '';
    if (teamLogo || teamAbbr) return { logo: teamLogo, abbr: teamAbbr || player.team };

    const side = normText(player.team_side);
    const team = normText(player.team);
    const home = (result && result.home) || {};
    const away = (result && result.away) || {};

    if (side === 'home') return { logo: home.logo, abbr: home.abbr || home.name };
    if (side === 'away') return { logo: away.logo, abbr: away.abbr || away.name };
    if (teamMatchesTeamText(player.team, home)) return { logo: home.logo, abbr: home.abbr || home.name };
    if (teamMatchesTeamText(player.team, away)) return { logo: away.logo, abbr: away.abbr || away.name };

    const hintedTeam = teamByAbbrHint(hintedTeamAbbr(player.name), home, away);
    if (hintedTeam) return { logo: hintedTeam.logo, abbr: hintedTeam.abbr || hintedTeam.name };

    return { logo: home.logo || away.logo || '', abbr: home.abbr || away.abbr || player.team || teamAbbr || '--' };
  }

  function fitName() {
    const el = document.getElementById('player-name');
    if (!el) return;
    el.style.fontSize = '56px';
    let size = 56;
    while (el.scrollWidth > el.clientWidth && size > 40) {
      size -= 2;
      el.style.fontSize = size + 'px';
    }
  }

  async function update() {
    try {
      const stamp = Date.now();
      const [res, resultRes] = await Promise.all([
        fetch(new URL('json/player.json?_=' + stamp, window.location.origin + '/').href, { cache: 'no-store' }),
        fetch(new URL('json/result.json?_=' + stamp, window.location.origin + '/').href, { cache: 'no-store' })
      ]);
      if (!res.ok) { hideCard(); return; }
      const player = await res.json();
      const result = resultRes.ok ? await resultRes.json() : {};

      const visible = !!(player && player.visible && String(player.mode || '').toLowerCase() !== 'hidden');
      const card = document.getElementById('card');

      if (!visible) { card.classList.remove('card--visible'); return; }

      const stats = (player && player.stats) || {};
      document.getElementById('player-name').textContent   = pv(displayPlayerName(player.name));
      document.getElementById('player-number').textContent = player.number ? ('#' + player.number) : '';
      fitName();

      const team = pv(player.team);
      const pos  = player.position ? String(player.position) : '';
      document.getElementById('player-sub').textContent = pos ? (team + '  ·  ' + pos) : team;

      document.getElementById('p-ppg').textContent = pv(stats.PPG);
      document.getElementById('p-rpg').textContent = pv(stats.RPG);
      document.getElementById('p-fg').textContent = pv(stats.FG);
      document.getElementById('p-apg').textContent = pv(stats.APG);
      document.getElementById('p-stl').textContent = pv(stats.STL);
      document.getElementById('p-blk').textContent = pv(stats.BLK);

      applyPhotoTransform(player);
      setPhoto(toMediaUrl(preferredPlayerPhoto(player)));
      const teamMark = resolveTeamLogo(player, result);
      setTeamLogo(toMediaUrl(teamMark.logo), teamMark.abbr);

      card.classList.add('card--visible');

    } catch(e) { console.warn(e); }
  }

  function hideCard() {
    const card = document.getElementById('card');
    if (card) card.classList.remove('card--visible');
  }

  update();
  setInterval(update, 5000);
</script>
</body>
</html>
